<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ahmed Real Estate</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Cairo',sans-serif;
background:#061321;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */
body::before{
content:'';
position:fixed;
inset:0;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.75)),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2200&auto=format&fit=crop');
background-size:cover;
background-position:center;
z-index:-2;
}

body::after{
content:'';
position:fixed;
inset:0;
backdrop-filter:blur(2px);
z-index:-1;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
padding:22px 7%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.18);
backdrop-filter:blur(16px);
border-bottom:1px solid rgba(255,255,255,.08);
z-index:999;
}

.logo{
font-size:30px;
font-weight:800;
}

.logo span{color:#7ee7ff;}

.nav-links{
display:flex;
gap:28px;
}

.nav-links a{
text-decoration:none;
color:white;
font-size:15px;
transition:.3s;
}

.nav-links a:hover{color:#7ee7ff;}

/* TOP FORM */
.top-form{
padding:140px 7% 40px;
display:flex;
justify-content:center;
}

.top-form-box{
max-width:650px;
width:100%;
padding:35px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border-radius:30px;
border:1px solid rgba(255,255,255,.12);
text-align:center;
}

.top-form-box h2{
margin-bottom:20px;
font-size:26px;
}

.input-group{
margin-bottom:15px;
}

input,select{
width:100%;
padding:16px;
border:none;
outline:none;
background:rgba(255,255,255,.08);
color:white;
border-radius:15px;
font-size:15px;
}

select option{color:black;}

.submit-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#25d366;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.4s;
}

.submit-btn:hover{
transform:translateY(-5px);
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:60px 20px 80px;
}

.hero-box{
max-width:950px;
animation:fadeUp 1s ease;
}

.badge{
display:inline-flex;
align-items:center;
gap:10px;
padding:12px 24px;
border-radius:50px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.12);
margin-bottom:30px;
font-size:14px;
}

.hero h1{
font-size:70px;
line-height:1.15;
margin-bottom:25px;
font-weight:800;
background:linear-gradient(to left,#fff,#8be8ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
font-size:20px;
line-height:2;
color:#e5e5e5;
max-width:760px;
margin:auto auto 40px;
}

/* BUTTONS */
.main-btn,.second-btn{
padding:18px 36px;
border-radius:60px;
text-decoration:none;
font-weight:700;
font-size:16px;
transition:.4s;
}

.main-btn{
background:#25d366;
color:white;
}

.second-btn{
background:rgba(255,255,255,.1);
color:white;
}

/* SOCIAL */
.socials{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-top:30px;
}

.socials a{
width:65px;
height:65px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,.08);
color:white;
font-size:26px;
text-decoration:none;
transition:.4s;
}

.socials a:hover{
background:#25d366;
transform:translateY(-8px);
}

/* FLOAT BUTTON */
.float-whatsapp{
position:fixed;
left:20px;
bottom:20px;
width:70px;
height:70px;
border-radius:50%;
background:#25d366;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:32px;
text-decoration:none;
box-shadow:0 10px 30px rgba(37,211,102,.4);
animation:pulse 2s infinite;
}

/* ACCESSIBILITY */
.accessibility-btn{
position:fixed;
right:20px;
bottom:110px;
width:65px;
height:65px;
border-radius:50%;
background:#007bff;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:26px;
text-decoration:none;
box-shadow:0 10px 30px rgba(0,123,255,.4);
animation:pulse 2s infinite;
}

/* ANIMATIONS */
@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:40px;}
.top-form-box{padding:25px;}
}

</style>
</head>
