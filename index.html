<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cairo',sans-serif;
background:#061321;
color:white;

}

/* BACKGROUND */
body::before{
content:'';
position:fixed;
inset:0;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.75)),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2200&auto=format&fit=crop');
background-size:cover;
background-position:center;
z-index:-2;
}

body::after{
content:'';
position:fixed;
inset:0;
backdrop-filter:blur(2px);
z-index:-1;
}

/* =========================
   🔥 الفورم (تم نقله للأول)
========================= */

.top-form{
padding:120px 7% 40px;
display:flex;
justify-content:center;
}

.top-form-box{
max-width:650px;
width:100%;
padding:35px;
background:rgba(255,255,255,.10);
backdrop-filter:blur(18px);
border-radius:25px;
border:1px solid rgba(255,255,255,.15);
text-align:center;
}

.top-form-box h2{
margin-bottom:20px;
font-size:26px;
}

.input-group{
margin-bottom:15px;
}

input,select{
width:100%;
padding:16px;
border:none;
outline:none;
background:rgba(255,255,255,.08);
color:white;
border-radius:15px;
font-size:15px;
}

select option{
color:black;
}

.submit-btn{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#25d366;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.submit-btn:hover{
transform:translateY(-5px);
}

/* =========================
   NAVBAR (زي ما هو)
========================= */

.navbar{
position:fixed;
top:0;
width:100%;
padding:22px 7%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.18);
backdrop-filter:blur(16px);
border-bottom:1px solid rgba(255,255,255,.08);
z-index:999;
}

.logo{
font-size:30px;
font-weight:800;
}

.logo span{color:#7ee7ff;}

.nav-links{
display:flex;
gap:28px;
}

.nav-links a{
text-decoration:none;
color:white;
font-size:15px;
transition:.3s;
}

.nav-links a:hover{color:#7ee7ff;}

/* =========================
   HERO (زي ما هو)
========================= */

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px 20px;
}

.hero-box{
max-width:900px;
}

.hero h1{
font-size:65px;
margin-bottom:20px;
background:linear-gradient(to left,#fff,#8be8ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
font-size:18px;
color:#ddd;
}

/* SOCIAL */
.socials{
display:flex;
justify-content:center;
gap:15px;
margin:40px 0;
}

.socials a{
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,.08);
color:white;
font-size:24px;
text-decoration:none;
transition:.3s;
}

.socials a:hover{
background:#25d366;
transform:translateY(-5px);
}

/* FLOAT */
.float-whatsapp{
position:fixed;
left:20px;
bottom:20px;
width:70px;
height:70px;
background:#25d366;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:32px;
text-decoration:none;
animation:pulse 2s infinite;
}

/* ACCESSIBILITY */
.accessibility-btn{
position:fixed;
right:20px;
bottom:110px;
width:65px;
height:65px;
background:#007bff;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:26px;
text-decoration:none;
animation:pulse 2s infinite;
}

/* ANIMATION */
@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

</style>
</head>

</html>
