<style>

body{
    margin:0;

    background:#0b1c33;

/* HERO */
.hero{
    text-align:center;
    padding:80px 20px;
    background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),

.hero h1{

}

.hero p{

    margin:auto;
    line-height:2;

.btn{

    padding:15px 30px;
    background:#25d366;

    text-decoration:none;

}

/* SECTION */
.section{
    padding:60px 20px;
    text-align:center;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
    margin-top:30px;
}

.card{
    width:250px;
    background:#122845;
    padding:20px;
    border-radius:15px;
}

/* FORM */
form{

    margin:auto;

    border-radius:20px;

input,select{
    width:100%;
    padding:12px;

    border-radius:10px;

button{
    width:100%;
    padding:15px;
    background:#25d366;
    border:none;
    color:white;
    font-size:18px;
    border-radius:10px;
}

/* SOCIAL */
.social{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:30px;
}

.social a{
    color:white;
    font-size:25px;
}

/* FLOAT */
.float{
    position:fixed;
    bottom:20px;
    left:20px;
    background:#25d366;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:28px;
