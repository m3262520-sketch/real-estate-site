<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Cairo',sans-serif;
background:#061321;

}

/* BACKGROUND */
body::before{
content:'';
position:fixed;
inset:0;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2200&auto=format&fit=crop');
background-size:cover;
background-position:center;
z-index:-2;
}

body::after{
content:'';
position:fixed;
inset:0;
backdrop-filter:blur(2px);
z-index:-1;
}

/* ========== TOP FULL SCREEN FORM ========== */

.full-form{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.form-box{

max-width:500px;
padding:35px;
background:rgba(255,255,255,.10);
backdrop-filter:blur(18px);
border-radius:25px;
border:1px solid rgba(255,255,255,.15);
text-align:center;
animation:fadeUp 1s ease;
}

.form-box h1{
font-size:28px;
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
}

input,select{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,.08);
color:white;
font-size:15px;
}

select option{color:black;}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#25d366;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.03);
}

/* HERO AFTER FORM */

.hero{
padding:80px 7%;
text-align:center;
}

.hero h2{
font-size:50px;
margin-bottom:20px;
}

.hero p{

opacity:.9;
}

/* SOCIAL */

.socials{
display:flex;
justify-content:center;
gap:15px;
margin-top:30px;
}

.socials a{
width:60px;height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,.1);
color:white;
text-decoration:none;
font-size:25px;
transition:.3s;
}

.socials a:hover{
background:#25d366;
transform:translateY(-5px);
}

/* FLOAT */

.float{
position:fixed;
left:20px;
bottom:20px;
width:70px;
height:70px;
background:#25d366;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
color:white;
text-decoration:none;
animation:pulse 2s infinite;
}

/* ACCESSIBILITY */

.access{
position:fixed;
right:20px;
bottom:110px;
width:65px;
height:65px;
background:#007bff;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:26px;
text-decoration:none;
animation:pulse 2s infinite;
}

/* ANIMATION */

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>
